spring:
  application:
    name: userservice

  datasource:
    url: jdbc:postgresql://localhost:5432/regular_authentication
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # 'update' — Hibernate adds missing columns (avatar_url, provider, etc.)
      # Safe to keep as 'update' permanently in development.
      # In production, use Flyway/Liquibase migrations instead.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9091
spring:
  application:
    name: apigateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8180/realms/spantag/protocol/openid-connect/certs
          issuer-uri: http://localhost:8180/realms/spantag

  cloud:
    gateway:
      server:
        webflux:
          trusted-proxies: ".*"

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
                allowedHeaders: ["*"]
                allowCredentials: true

          routes:

            # ── Auth service (9090) ──────────────────────────────────
            - id: auth-login
              uri: http://localhost:9090
              predicates:
                - Path=/api/auth/login

            - id: auth-register
              uri: http://localhost:9090
              predicates:
                - Path=/api/auth/register

            - id: auth-logout
              uri: http://localhost:9090
              predicates:
                - Path=/api/auth/logout

            # ── ADDED: was missing, caused authFetch retry to fail ───
            - id: auth-refresh
              uri: http://localhost:9090
              predicates:
                - Path=/api/auth/refresh

            - id: auth-oauth2-save
              uri: http://localhost:9090
              predicates:
                - Path=/api/auth/oauth2/save-user

            # ── Profile service (9093) ───────────────────────────────
            - id: profile-service
              uri: http://localhost:9093
              predicates:
                - Path=/api/profile/**

            # ── User service (9091) ──────────────────────────────────
            - id: user-me
              uri: http://localhost:9091
              predicates:
                - Path=/api/user/me
              filters:
                - name: KeycloakJwtFilter

            - id: admin-users
              uri: http://localhost:9091
              predicates:
                - Path=/api/admin/users/**
              filters:
                - name: KeycloakJwtFilter

            # ── Dashboard service (9094) ─────────────────────────────
            - id: admin-dashboard
              uri: http://localhost:9094
              predicates:
                - Path=/api/admin/dashboard
              filters:
                - name: KeycloakJwtFilter

            - id: user-dashboard
              uri: http://localhost:9094
              predicates:
                - Path=/api/user/dashboard
              filters:
                - name: KeycloakJwtFilter

            # ── Order service (9095) ─────────────────────────────────
            - id: orders
              uri: http://localhost:9095
              predicates:
                - Path=/api/orders/**
              filters:
                - name: KeycloakJwtFilter

            # ── Payment service (9096) ───────────────────────────────
            - id: payment-my
              uri: http://localhost:9096
              predicates:
                - Path=/api/payment/my
              filters:
                - name: KeycloakJwtFilter

            - id: payment-admin
              uri: http://localhost:9096
              predicates:
                - Path=/api/payment/admin/**
              filters:
                - name: KeycloakJwtFilter

            # ── OAuth2 service (9092) ────────────────────────────────
            - id: oauth2-initiate
              uri: http://localhost:9092
              predicates:
                - Path=/oauth2/**

            - id: oauth2-callback
              uri: http://localhost:9092
              predicates:
                - Path=/login/oauth2/**

server:
  port: 1013

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO